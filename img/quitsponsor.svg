<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1d2b4f"/>
      <stop offset="100%" stop-color="#0c1226"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff5f6d"/>
    </linearGradient>
  </defs>

  <!-- night background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- small stars: the 2 a.m. sky -->
  <circle cx="112" cy="96" r="5" fill="#f5ead9" opacity="0.9"/>
  <circle cx="404" cy="132" r="4" fill="#f5ead9" opacity="0.7"/>
  <circle cx="356" cy="72" r="3" fill="#f5ead9" opacity="0.55"/>
  <circle cx="76" cy="196" r="3" fill="#f5ead9" opacity="0.5"/>
  <circle cx="436" cy="228" r="3" fill="#f5ead9" opacity="0.45"/>

  <!-- life buoy that is also a speech bubble -->
  <g>
    <!-- bubble tail -->
    <path d="M 196 388 L 168 462 L 258 404 Z" fill="url(#ring)"/>
    <!-- outer ring -->
    <circle cx="256" cy="248" r="150" fill="none" stroke="url(#ring)" stroke-width="58"/>
    <!-- buoy segment separators (cream notches) -->
    <g stroke="#f5ead9" stroke-width="14" stroke-linecap="round">
      <line x1="256" y1="76" x2="256" y2="118"/>
      <line x1="256" y1="378" x2="256" y2="420"/>
      <line x1="84"  y1="248" x2="126" y2="248"/>
      <line x1="386" y1="248" x2="428" y2="248"/>
    </g>
    <!-- inner water: the wave that passes -->
    <clipPath id="inner"><circle cx="256" cy="248" r="121"/></clipPath>
    <g clip-path="url(#inner)">
      <circle cx="256" cy="248" r="121" fill="#0c1226"/>
      <path d="M 110 268 Q 160 218 210 262 T 310 262 T 410 262 L 410 380 L 110 380 Z"
            fill="#2e6fb0" opacity="0.85"/>
      <path d="M 110 296 Q 165 252 220 292 T 330 292 T 430 292 L 430 380 L 110 380 Z"
            fill="#1d4f86" opacity="0.9"/>
      <!-- moon above the wave: the night watch -->
      <circle cx="300" cy="192" r="26" fill="#f5ead9"/>
      <circle cx="288" cy="182" r="24" fill="#0c1226"/>
    </g>
  </g>
</svg>
